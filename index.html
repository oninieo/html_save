<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>군중 밀집 위험 3D 시뮬레이터</title><style>*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:#07182c;color:#eef7ff;overflow:hidden}body{display:grid;grid-template-columns:330px 1fr}.panel{padding:16px;background:#0a1421;border-right:1px solid #27445d;overflow:auto}.panel h1{font-size:20px;margin:0 0 8px}.panel p{font-size:12px;color:#a7bfd1;line-height:1.45}.box{background:#112238;border:1px solid #294a64;border-radius:12px;padding:12px;margin:12px 0}.row{display:grid;grid-template-columns:1fr auto;gap:8px;font-size:12px;margin:8px 0}.row b{font-variant-numeric:tabular-nums}input{width:100%}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:#091521;border:1px solid #294a64;border-radius:9px;padding:9px}.stat small{display:block;color:#9db5c8}.stat strong{font-size:19px}.risk{text-align:center;padding:12px;border-radius:10px;background:#2a260d;border:1px solid #facc15}.risk strong{font-size:23px}.stage{position:relative;background:radial-gradient(circle at 45% 20%,#1a4777,#061324 72%)}#c{position:absolute;inset:0}.tip{position:absolute;top:14px;right:14px;background:#08131fcc;border:1px solid #2f506a;border-radius:10px;padding:9px 11px;font-size:12px}.note{font-size:10px;color:#8199ab}.legend{font-size:11px;line-height:1.8}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px}@media(max-width:850px){body{grid-template-columns:1fr}.panel{position:absolute;z-index:2;width:300px;max-width:86vw;height:100%;opacity:.96}.stage{height:100vh}}</style></head><body><aside class="panel"><h1>군중 밀집 위험 3D 시뮬레이터</h1><p>도시형 행사장의 인원, 출구, 통로 폭과 패닉 수준을 조절해 밀집 위험을 비교합니다.</p><div class="box"><div class="row"><span>참가 인원</span><b id="nv"></b></div><input id="n" type="range" min="100" max="2000" step="50" value="900"><div class="row"><span>통로 폭</span><b id="wv"></b></div><input id="w" type="range" min="3" max="14" step=".5" value="7"><div class="row"><span>출구 수</span><b id="ev"></b></div><input id="e" type="range" min="1" max="4" value="2"><div class="row"><span>출구 폭</span><b id="ewv"></b></div><input id="ew" type="range" min="1.2" max="6" step=".2" value="2.8"><div class="row"><span>패닉 비율</span><b id="pv"></b></div><input id="p" type="range" min="0" max="70" step="5" value="10"></div><div class="box"><div class="risk" id="risk"><strong id="grade">주의</strong><div id="desc">병목 구간 관리 필요</div></div><div class="stats" style="margin-top:8px"><div class="stat"><small>최대 밀도</small><strong id="den">0.0</strong> 명/㎡</div><div class="stat"><small>대피시간</small><strong id="time">0.0</strong> 분</div><div class="stat"><small>출구 부하율</small><strong id="load">0</strong>%</div><div class="stat"><small>고위험 인원</small><strong id="high">0</strong> 명</div></div></div><div class="box legend"><span class="dot" style="background:#22c55e"></span>안정　<span class="dot" style="background:#facc15"></span>주의<br><span class="dot" style="background:#f97316"></span>위험　<span class="dot" style="background:#ef4444"></span>매우 위험　<span class="dot" style="background:#a855f7"></span>임계</div><div class="note">※ 교육·정책 검토용 단순화 모델입니다. 실제 안전계획을 대체하지 않습니다.</div></aside><main class="stage"><div id="c"></div><div class="tip">드래그: 회전 · 휠: 확대/축소</div></main><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script><script>const $=x=>document.getElementById(x),S={n:$('n'),w:$('w'),e:$('e'),ew:$('ew'),p:$('p')};let sc,cam,rend,people=[],mesh,exits=[],obs=[],t=0,drag=false,px=0,py=0,th=.85,ph=1.05,rad=50;function vals(){let q={n:+S.n.value,w:+S.w.value,e:+S.e.value,ew:+S.ew.value,p:+S.p.value/100};$('nv').textContent=q.n+'명';$('wv').textContent=q.w+'m';$('ev').textContent=q.e+'개';$('ewv').textContent=q.ew+'m';$('pv').textContent=Math.round(q.p*100)+'%';return q}function box(g,x,y,z,a,b,c,col){let m=new THREE.Mesh(new THREE.BoxGeometry(a,b,c),new THREE.MeshLambertMaterial({color:col}));m.position.set(x,y,z);g.add(m)}function city(){while(sc.children.length>3)sc.remove(sc.children[3]);let q=vals(),g=new THREE.Group();sc.add(g);box(g,0,-.25,0,70,.5,70,0x08233f);box(g,0,.02,-3,52,.12,4.2,0xf4f3ee);box(g,14,.02,8,4.2,.12,40,0xf4f3ee);box(g,0,.03,-9,24,.12,16,0x12385f);box(g,0,.05,8,q.w,.12,17,0x1b4c7c);for(let i=0;i<7;i++){let x=-27+i*8;box(g,x,3,-18,5,6+Math.random()*7,6,0xdce7f4);box(g,x+3,2.5,20,5,5+Math.random()*6,5,0x9fc8ff)}for(let i=0;i<6;i++){box(g,-22+i*8,1.2,-1,2,2.4,2,i%2?0xe7eff8:0x9bc8ff);obs.push({x:-22+i*8,z:-1,r:1.4})}exits=[];for(let i=0;i<q.e;i++){let x=-8+(16/(q.e+1))*(i+1);exits.push(new THREE.Vector3(x,0,22));box(g,x-q.ew/2,1,17,.18,2,.18,0xffffff);box(g,x+q.ew/2,1,17,.18,2,.18,0xffffff);box(g,x,2,17,q.ew+.3,.18,.18,0xffffff)}let geo=new THREE.CylinderGeometry(.12,.12,.5,6),mat=new THREE.MeshLambertMaterial({color:0x22c55e});mesh=new THREE.InstancedMesh(geo,mat,Math.min(420,Math.max(70,Math.round(q.n/4.2))));g.add(mesh);people=[];let d=new THREE.Object3D();for(let i=0;i<mesh.count;i++){let p={x:(Math.random()-.5)*20,z:-14+Math.random()*12,vx:0,vz:0};people.push(p);d.position.set(p.x,.35,p.z);d.updateMatrix();mesh.setMatrixAt(i,d.matrix);mesh.setColorAt(i,new THREE.Color(0x22c55e))}mesh.instanceMatrix.needsUpdate=true;mesh.instanceColor.needsUpdate=true}function risk(q,dens,high){let cap=q.e*q.ew*78,load=Math.min(300,q.n/cap*100*(1+q.p*.8)),ev=q.n/cap*(1+Math.max(0,load-100)/120+q.p*.7);$('den').textContent=dens.toFixed(1);$('time').textContent=ev.toFixed(1);$('load').textContent=Math.round(load);$('high').textContent=Math.round(high);let a=dens<2.5&&load<80?['안정','원활한 이동 예상','#22c55e','#10271a']:dens<4&&load<110?['주의','병목 구간 관리 필요','#facc15','#2a260d']:dens<5.5&&load<150?['위험','출구 분산과 유입 통제 필요','#f97316','#301b0d']:dens<7.5&&load<220?['매우 위험','즉시 군중 흐름 분산 필요','#ef4444','#321013']:['임계','압사 위험 가능성: 긴급 통제','#c084fc','#24102f'];$('grade').textContent=a[0];$('desc').textContent=a[1];$('grade').style.color=a[2];$('risk').style.background=a[3];$('risk').style.borderColor=a[2]}function step(dt){let q=vals(),d=new THREE.Object3D(),bins={};for(let p of people){let k=Math.round(p.x/2)+','+Math.round(p.z/2);bins[k]=(bins[k]||0)+1}let max=0,high=0,scale=q.n/people.length;for(let i=0;i<people.length;i++){let p=people[i],e=exits.reduce((a,b)=>(p.x-b.x)**2+(p.z-b.z)**2<(p.x-a.x)**2+(p.z-a.z)**2?b:a,exits[0]),dx=e.x-p.x,dz=e.z-p.z,l=Math.hypot(dx,dz)||1,den=(bins[Math.round(p.x/2)+','+Math.round(p.z/2)]||1)*scale/4;max=Math.max(max,den);if(den>5.5)high+=scale;let speed=1.1*(1+q.p*.5);p.vx+=(dx/l*speed-p.vx)*dt*2;p.vz+=(dz/l*speed-p.vz)*dt*2;if(p.z>0&&Math.abs(p.x)>q.w/2)p.vx+=-Math.sign(p.x)*dt*2;p.x+=p.vx*dt;p.z+=p.vz*dt;if(p.z>23){p.z=-14;p.x=(Math.random()-.5)*20}let col=den<2?0x22c55e:den<4?0xfacc15:den<5.5?0xf97316:den<7?0xef4444:0xa855f7;d.position.set(p.x,.35,p.z);d.rotation.y=Math.atan2(p.vx,p.vz);d.updateMatrix();mesh.setMatrixAt(i,d.matrix);mesh.setColorAt(i,new THREE.Color(col))}mesh.instanceMatrix.needsUpdate=true;mesh.instanceColor.needsUpdate=true;risk(q,max,high)}function init(){sc=new THREE.Scene();sc.background=new THREE.Color(0x071a32);cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,300);rend=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});rend.setPixelRatio(Math.min(devicePixelRatio,1.25));rend.setSize(document.querySelector('.stage').clientWidth,innerHeight);$('c').appendChild(rend.domElement);sc.add(new THREE.HemisphereLight(0xffffff,0x25415d,1.2));let l=new THREE.DirectionalLight(0xffffff,.8);l.position.set(20,35,15);sc.add(l);let base=new THREE.Group();sc.add(base);city();Object.values(S).forEach(x=>x.oninput=city);let c=rend.domElement;c.onpointerdown=e=>{drag=true;px=e.clientX;py=e.clientY};c.onpointerup=()=>drag=false;c.onpointermove=e=>{if(!drag)return;th-=(e.clientX-px)*.008;ph=Math.max(.5,Math.min(1.4,ph+(e.clientY-py)*.006));px=e.clientX;py=e.clientY};c.onwheel=e=>{e.preventDefault();rad=Math.max(28,Math.min(80,rad+e.deltaY*.03))};addEventListener('resize',()=>{cam.aspect=document.querySelector('.stage').clientWidth/innerHeight;cam.updateProjectionMatrix();rend.setSize(document.querySelector('.stage').clientWidth,innerHeight)});let last=performance.now();(function loop(now){requestAnimationFrame(loop);let dt=Math.min(.033,(now-last)/1000);last=now;t+=dt;step(dt);cam.position.set(rad*Math.sin(ph)*Math.sin(th),rad*Math.cos(ph),rad*Math.sin(ph)*Math.cos(th));cam.lookAt(0,2,0);rend.render(sc,cam)})(last)}init()</script></body></html>
