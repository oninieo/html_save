<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부 안내서비스 통합검색</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}

:root{
  --navy: #14294B;
  --navy-2: #1E3A66;
  --blue: #2C5FD8;
  --blue-dark: #1D46AE;
  --bg: #EEF2F8;
  --card: #FFFFFF;
  --border: #D7DFEC;
  --text: #16213A;
  --text-sub: #5B6B85;
  --line: #C7D2E4;
  --ok: #1D6E4B;
  --ok-bg: #E4F3EC;
  --no: #A03A2C;
  --no-bg: #FAE7E2;
  --mono: 'IBM Plex Mono', 'Roboto Mono', ui-monospace, monospace;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a{ color: inherit; }

/* ===== Header ===== */
.gov-header{
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
  color: #fff;
  padding: 34px 24px 30px;
  border-bottom: 4px solid var(--blue);
}
.gov-header-inner{
  max-width: 980px;
  margin: 0 auto;
}
.gov-eyebrow{
  display:flex;
  align-items:center;
  gap:8px;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: #AFC4EC;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.gov-eyebrow::before{
  content:"";
  width: 7px; height: 7px;
  background: #6FE3B0;
  border-radius: 50%;
  display:inline-block;
  box-shadow: 0 0 0 3px rgba(111,227,176,0.18);
}
h1{
  font-size: clamp(24px, 3.4vw, 32px);
  font-weight: 800;
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}
.gov-sub{
  font-size: 14.5px;
  color: #C9D6EF;
  margin: 0;
  line-height: 1.6;
}

/* ===== Controls ===== */
.controls-wrap{
  max-width: 980px;
  margin: -20px auto 0;
  padding: 0 24px;
  position: relative;
  z-index: 5;
}
.controls-card{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px 16px;
  box-shadow: 0 8px 24px rgba(20,41,75,0.08);
}
.search-row{
  display:flex;
  gap: 10px;
  margin-bottom: 14px;
}
.search-box{
  flex: 1;
  position: relative;
  display:flex;
  align-items:center;
}
.search-box svg{
  position:absolute;
  left: 13px;
  width: 17px; height: 17px;
  color: var(--text-sub);
  pointer-events:none;
}
#searchInput{
  width: 100%;
  padding: 11px 14px 11px 38px;
  font-size: 15px;
  border: 1.5px solid var(--line);
  border-radius: 7px;
  background: #FBFCFE;
  color: var(--text);
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
#searchInput:focus{
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(44,95,216,0.14);
  background: #fff;
}
#searchInput::placeholder{ color: #9AA7BE; }

.clear-btn{
  border: 1.5px solid var(--line);
  background: #FBFCFE;
  color: var(--text-sub);
  border-radius: 7px;
  padding: 0 16px;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
}
.clear-btn:hover{
  background: #EEF2F8;
  color: var(--text);
  border-color: #B9C6DC;
}

.filter-label{
  font-size: 12px;
  font-weight: 700;
  color: var(--text-sub);
  margin: 0 0 8px;
  letter-spacing: 0.02em;
}
.chip-row{
  display:flex;
  flex-wrap: wrap;
  gap: 7px;
}
.chip{
  border: 1.5px solid var(--line);
  background: #FBFCFE;
  color: var(--text);
  padding: 6px 13px;
  border-radius: 999px;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .13s;
  line-height: 1.4;
}
.chip:hover{ border-color: var(--blue); }
.chip.active{
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.chip .chip-count{
  font-weight: 700;
  opacity: 0.75;
  margin-left: 3px;
  font-size: 12px;
}

/* ===== Result meta ===== */
.result-meta{
  max-width: 980px;
  margin: 18px auto 10px;
  padding: 0 24px;
  display:flex;
  align-items:baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}
.result-count{
  font-size: 14px;
  color: var(--text-sub);
}
.result-count strong{
  color: var(--navy);
  font-size: 17px;
  font-weight: 800;
  margin-right: 2px;
}
.sort-hint{
  font-size: 12.5px;
  color: #8B98B2;
}

/* ===== List ===== */
.list-wrap{
  max-width: 980px;
  margin: 0 auto;
  padding: 0 24px 60px;
}
.card-list{
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.svc-card{
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 4px solid var(--cat-color, var(--blue));
  border-radius: 8px;
  padding: 15px 18px;
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  transition: box-shadow .15s, transform .1s;
}
.svc-card:hover{
  box-shadow: 0 4px 14px rgba(20,41,75,0.09);
}
.svc-main{
  min-width: 0;
}
.svc-name{
  font-size: 15.5px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 4px;
}
.svc-name mark{
  background: #FFE38A;
  color: var(--text);
  border-radius: 3px;
  padding: 0 1px;
}
.svc-meta{
  display:flex;
  align-items:center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text-sub);
}
.svc-meta .dot{
  width: 3px; height:3px;
  background: #C0CBDF;
  border-radius: 50%;
}
.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size: 11.5px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
}
.tag-cat{
  background: var(--cat-bg, #E7EEFB);
  color: var(--cat-color, var(--blue-dark));
}
.tag-online{
  background: var(--ok-bg);
  color: var(--ok);
}
.tag-offline{
  background: var(--no-bg);
  color: var(--no);
}
.tag-online::before, .tag-offline::before{
  content:"";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.org-col{
  font-size: 13px;
  color: var(--text-sub);
  min-width: 96px;
  text-align: left;
}
.org-col .org-label{
  display:block;
  font-size: 10.5px;
  color: #9AA7BE;
  font-weight: 700;
  margin-bottom: 2px;
  letter-spacing: 0.03em;
}
.call-btn{
  display:flex;
  align-items:center;
  gap: 7px;
  background: var(--navy);
  color: #fff;
  border-radius: 7px;
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
}
.call-btn:hover{ background: var(--blue-dark); }
.call-btn svg{ width: 14px; height: 14px; flex-shrink:0; }

.empty-state{
  text-align:center;
  padding: 70px 20px;
  color: var(--text-sub);
}
.empty-state .icon{
  font-size: 36px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state p{ margin: 4px 0; font-size: 14.5px; }
.empty-state .em-sub{ font-size: 13px; color: #9AA7BE; }

footer{
  text-align:center;
  font-size: 12px;
  color: #9AA7BE;
  padding: 18px 24px 34px;
}

/* ===== Responsive ===== */
@media (max-width: 720px){
  .svc-card{
    grid-template-columns: 1fr;
    align-items: flex-start;
    gap: 10px;
  }
  .org-col{ text-align: left; }
  .call-btn{ width: fit-content; }
  .search-row{ flex-wrap: wrap; }
}

/* focus visibility */
.chip:focus-visible, .clear-btn:focus-visible, .call-btn:focus-visible, #searchInput:focus-visible{
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce){
  *{ transition: none !important; }
}
</style>
</head>
<body>

<header class="gov-header">
  <div class="gov-header-inner">
    <div class="gov-eyebrow">정부 안내서비스 통합검색</div>
    <h1>필요한 안내서비스를 빠르게 찾아보세요</h1>
    <p class="gov-sub">서비스명으로 검색하거나 분야를 선택하면 소관기관과 콜센터 번호를 바로 확인할 수 있습니다.</p>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-card">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="서비스명을 입력하세요 (예: 기초연금, 전입신고)" autocomplete="off">
      </div>
      <button class="clear-btn" id="resetBtn" type="button">초기화</button>
    </div>
    <div class="filter-label">안내분야</div>
    <div class="chip-row" id="chipRow"></div>
  </div>
</div>

<div class="result-meta">
  <div class="result-count"><strong id="countNum">0</strong>건의 안내서비스</div>
  <div class="sort-hint">서비스ID 순</div>
</div>

<div class="list-wrap">
  <div class="card-list" id="cardList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">⌕</div>
    <p>검색 결과가 없습니다.</p>
    <p class="em-sub">다른 검색어나 분야를 선택해 보세요.</p>
  </div>
</div>

<footer>총 24건의 안내서비스 · 온라인안내 가능 여부는 소관기관 사정에 따라 변경될 수 있습니다.</footer>

<script>

  {"서비스ID":"A004","서비스명":"민원접수 안내","안내분야":"민원","소관기관":"교육부","온라인안내":"가능","콜센터":"1341"},
  {"서비스ID":"A005","서비스명":"정부24 이용 안내","안내분야":"민원","소관기관":"국토교통부","온라인안내":"가능","콜센터":"1356"},
  {"서비스ID":"A006","서비스명":"기초연금 안내","안내분야":"복지","소관기관":"행정안전부","온라인안내":"불가","콜센터":"1386"},
  {"서비스ID":"A007","서비스명":"복지급여 안내","안내분야":"복지","소관기관":"고용노동부","온라인안내":"가능","콜센터":"1319"},
  {"서비스ID":"A008","서비스명":"장애인지원 안내","안내분야":"복지","소관기관":"보건복지부","온라인안내":"가능","콜센터":"1337"},
  {"서비스ID":"A009","서비스명":"아동수당 안내","안내분야":"복지","소관기관":"지자체","온라인안내":"가능","콜센터":"1326"},
  {"서비스ID":"A010","서비스명":"지방세 납부 안내","안내분야":"세금","소관기관":"보건복지부","온라인안내":"가능","콜센터":"1357"},
  {"서비스ID":"A011","서비스명":"취득세 안내","안내분야":"세금","소관기관":"국토교통부","온라인안내":"가능","콜센터":"1341"},
  {"서비스ID":"A012","서비스명":"재산세 안내","안내분야":"세금","소관기관":"지자체","온라인안내":"가능","콜센터":"1317"},
  {"서비스ID":"A013","서비스명":"자동차등록 안내","안내분야":"교통","소관기관":"국토교통부","온라인안내":"가능","콜센터":"1399"},
  {"서비스ID":"A014","서비스명":"운전면허 안내","안내분야":"교통","소관기관":"보건복지부","온라인안내":"불가","콜센터":"1357"},
  {"서비스ID":"A015","서비스명":"주정차단속 안내","안내분야":"교통","소관기관":"국토교통부","온라인안내":"가능","콜센터":"1367"},
  {"서비스ID":"A016","서비스명":"재난지원금 안내","안내분야":"재난","소관기관":"행정안전부","온라인안내":"불가","콜센터":"1356"},
  {"서비스ID":"A017","서비스명":"대피소 안내","안내분야":"재난","소관기관":"국세청","온라인안내":"가능","콜센터":"1359"},
  {"서비스ID":"A018","서비스명":"안전신고 안내","안내분야":"재난","소관기관":"국세청","온라인안내":"가능","콜센터":"1357"},
  {"서비스ID":"A019","서비스명":"국민취업지원 안내","안내분야":"일자리","소관기관":"지자체","온라인안내":"가능","콜센터":"1386"},
  {"서비스ID":"A020","서비스명":"구직급여 안내","안내분야":"일자리","소관기관":"국토교통부","온라인안내":"불가","콜센터":"1350"},
  {"서비스ID":"A021","서비스명":"청년일자리 안내","안내분야":"일자리","소관기관":"지자체","온라인안내":"가능","콜센터":"1392"},
  {"서비스ID":"A022","서비스명":"평생교육 안내","안내분야":"교육","소관기관":"국토교통부","온라인안내":"가능","콜센터":"1379"},
  {"서비스ID":"A023","서비스명":"학자금 안내","안내분야":"교육","소관기관":"지자체","온라인안내":"가능","콜센터":"1324"},
  {"서비스ID":"A024","서비스명":"교육비지원 안내","안내분야":"교육","소관기관":"행정안전부","온라인안내":"가능","콜센터":"1368"}
];

const CATEGORY_COLORS = {
  "민원": { color: "#1D46AE", bg: "#E7EEFB" },
  "복지": { color: "#1D6E4B", bg: "#E4F3EC" },
  "세금": { color: "#8A5A0E", bg: "#FBEFDD" },
  "교통": { color: "#5B3FA6", bg: "#EEE8FA" },
  "재난": { color: "#A03A2C", bg: "#FAE7E2" },
  "일자리": { color: "#0E6E7A", bg: "#DDF1F3" },
  "교육": { color: "#2C5FD8", bg: "#E7EEFB" }
};

const CATEGORY_ORDER = ["민원","복지","세금","교통","재난","일자리","교육"];

let state = { query: "", category: "전체" };

function buildChips(){
  const chipRow = document.getElementById('chipRow');
  const counts = { "전체": DATA.length };
  CATEGORY_ORDER.forEach(c => counts[c] = DATA.filter(d => d.안내분야 === c).length);

  const chips = ["전체", ...CATEGORY_ORDER];
  chipRow.innerHTML = chips.map(c => `
    <button class="chip ${c === state.category ? 'active' : ''}" data-cat="${c}" type="button">
      ${c}<span class="chip-count">${counts[c]}</span>
    </button>
  `).join('');

  chipRow.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      state.category = btn.dataset.cat;
      render();
    });
  });
}

function highlight(text, query){
  if(!query) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if(idx === -1) return escapeHtml(text);
  const before = escapeHtml(text.slice(0, idx));
  const match = escapeHtml(text.slice(idx, idx + query.length));
  const after = escapeHtml(text.slice(idx + query.length));
  return `${before}<mark>${match}</mark>${after}`;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  const q = state.query.trim().toLowerCase();
  const filtered = DATA.filter(item => {
    const catOk = state.category === "전체" || item.안내분야 === state.category;
    const queryOk = !q || item.서비스명.toLowerCase().includes(q);
    return catOk && queryOk;
  });

  document.getElementById('countNum').textContent = filtered.length;

  const listEl = document.getElementById('cardList');
  const emptyEl = document.getElementById('emptyState');

  if(filtered.length === 0){
    listEl.innerHTML = "";
    emptyEl.style.display = "block";
  } else {
    emptyEl.style.display = "none";
    listEl.innerHTML = filtered.map(item => {
      const cat = CATEGORY_COLORS[item.안내분야] || { color:"#2C5FD8", bg:"#E7EEFB" };
      const isOnline = item.온라인안내 === "가능";
      return `
        <div class="svc-card" style="--cat-color:${cat.color}; --cat-bg:${cat.bg};">
          <div class="svc-main">
            <p class="svc-name">${highlight(item.서비스명, state.query)}</p>
            <div class="svc-meta">
              <span>${item.서비스ID}</span>
            </div>
          </div>
          <span class="tag tag-cat">${item.안내분야}</span>
          <span class="tag ${isOnline ? 'tag-online' : 'tag-offline'}">온라인안내 ${item.온라인안내}</span>
          <div class="org-col">
            <span class="org-label">소관기관</span>
            ${escapeHtml(item.소관기관)}
          </div>
          <a class="call-btn" href="tel:${item.콜센터}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${item.콜센터}
          </a>
        </div>
      `;
    }).join('');
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  state.query = e.target.value;
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.query = "";
  state.category = "전체";
  document.getElementById('searchInput').value = "";
  buildChips();
  render();
});

buildChips();
render();
</script>

</body>
</html>
